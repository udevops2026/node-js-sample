<!DOCTYPE html>
<html>
<head>
<title>My Shopping App</title>
<style>
body {
    font-family: Arial;
    margin: 0;
}
header {
    background: #2874f0;
    color: white;
    padding: 15px;
    text-align: center;
}
.products {
    display: flex;
    gap: 20px;
    padding: 20px;
}
.card {
    border: 1px solid #ddd;
    padding: 15px;
    width: 200px;
}
</style>
</head>
<body>

<header>
    <h1>My Flipkart Demo Store</h1>
</header>

<div class="products">
    <div class="card">
        <h3>iPhone 15</h3>
        <p>₹79,999</p>
    </div>

    <div class="card">
        <h3>Samsung TV</h3>
        <p>₹45,999</p>
    </div>

    <div class="card">
        <h3>Laptop</h3>
        <p>₹65,000</p>
    </div>
</div>

</body>
</html>
